# 手动触发：GitHub → Actions → Deploy backend → Run workflow。
# 密钥与变量见 docs/production-and-release.md。
#
# 上传不用 scp：新版 OpenSSH 的 scp 默认走 SFTP 子系统，部分服务器在认证成功后仍会在传文件时挂死；
# 改用 ssh 执行通道 + stdin 写文件。并用 GNU timeout 限制整段上传时间（ConnectTimeout 只管首包连上）。

name: Deploy backend

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        working-directory: backend
        run: mvn -B verify

      - name: Stage jar for upload
        run: |
          set -e
          mkdir -p release
          JAR="$(ls backend/target/home-accounting-server-*.jar | head -1)"
          test -f "$JAR"
          cp "$JAR" release/home-accounting-server.jar

      - name: Write deploy SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/github_deploy_key
          chmod 600 ~/.ssh/github_deploy_key

      # 整步最多 6 分钟；内层 timeout 300 秒：传输阶段卡住时仍会退出（ConnectTimeout 无法覆盖 scp/sftp 传一半）
      - name: Upload jar to server (ssh stdin, avoids SFTP/scp hang)
        timeout-minutes: 6
        env:
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          SSH_TARGET: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/github_deploy_key"
          d="${REMOTE_DIR%/}"
          part="${d}/.home-accounting-server.jar.part"
          final="${d}/home-accounting-server.jar"
          timeout 300 ssh -i "$KEY" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$SSH_TARGET" \
            "bash -c 'cat > \"${part}\" && mv -f \"${part}\" \"${final}\"'" < release/home-accounting-server.jar

      - name: Remote install and restart (native ssh)
        timeout-minutes: 6
        env:
          REMOTE_CMD: ${{ secrets.DEPLOY_REMOTE_COMMAND }}
        run: |
          set -euo pipefail
          echo "$REMOTE_CMD" | ssh -i "$HOME/.ssh/github_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' \
            'bash -euo pipefail -s'
