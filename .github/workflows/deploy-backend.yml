# 手动触发：GitHub → Actions → Deploy backend → Run workflow。
# 密钥与变量见 docs/production-and-release.md。
#
# 上传改用 Runner 自带的 scp/ssh（不再使用 appleboy/scp-action）：drone-scp 在部分网络下
# 会长时间卡在「scp file to server」且超时参数不生效；OpenSSH 的 ConnectTimeout 更可靠。

name: Deploy backend

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        working-directory: backend
        run: mvn -B verify

      - name: Stage jar for upload
        run: |
          set -e
          mkdir -p release
          JAR="$(ls backend/target/home-accounting-server-*.jar | head -1)"
          test -f "$JAR"
          cp "$JAR" release/home-accounting-server.jar

      - name: Write deploy SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/github_deploy_key
          chmod 600 ~/.ssh/github_deploy_key

      # 整步最多 6 分钟：到时 GitHub 会强制结束本步（比 docker 内 drone-scp 不遵守超时更可控）
      - name: Upload jar to server (native scp)
        timeout-minutes: 6
        run: |
          set -euo pipefail
          DEST="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_REMOTE_DIR }}/"
          scp -i "$HOME/.ssh/github_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            release/home-accounting-server.jar \
            "$DEST"

      - name: Remote install and restart (native ssh)
        timeout-minutes: 6
        env:
          REMOTE_CMD: ${{ secrets.DEPLOY_REMOTE_COMMAND }}
        run: |
          set -euo pipefail
          echo "$REMOTE_CMD" | ssh -i "$HOME/.ssh/github_deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o ConnectionAttempts=1 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' \
            'bash -euo pipefail -s'
