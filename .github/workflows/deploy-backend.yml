# 手动触发：GitHub → Actions → Deploy backend → Run workflow。
# 密钥与变量见 docs/production-and-release.md。

name: Deploy backend

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        working-directory: backend
        run: mvn -B verify

      - name: Stage jar for upload
        run: |
          set -e
          mkdir -p release
          JAR="$(ls backend/target/home-accounting-server-*.jar | head -1)"
          test -f "$JAR"
          cp "$JAR" release/home-accounting-server.jar

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: release/home-accounting-server.jar
          target: ${{ secrets.DEPLOY_REMOTE_DIR }}

      - name: Remote install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: ${{ secrets.DEPLOY_REMOTE_COMMAND }}
